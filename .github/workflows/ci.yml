name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test and Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build all targets
        run: npm run build:all

      - name: Self-analysis (dogfood)
        if: matrix.node-version == '20.x'
        run: npm run dogfood

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Check coverage threshold
        run: |
          echo "Checking coverage threshold ≥75%..."
          npm run test:coverage -- --reporter=json --reporter=text > coverage-summary.json || true
          # Vitest with @vitest/coverage-v8 will fail if thresholds aren't met in vitest.config.ts

      - name: Upload coverage reports
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

  security-scan:
    name: Security Scan (cognium-ai)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install cognium-ai
        run: npm install -g cognium-ai@latest

      - name: Run security scan
        env:
          LLM_BASE_URL: https://llmproxy.xus.one/v1
        run: cognium-ai scan ./src

      - name: Run trust score
        env:
          LLM_BASE_URL: https://llmproxy.xus.one/v1
        run: cognium-ai trust ./src

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck
