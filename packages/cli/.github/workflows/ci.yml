name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun test

      - name: Dogfood (scan own source)
        run: bun run dogfood

  security-scan:
    name: Security Scan (cognium-ai)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'

      - name: Install cognium-ai
        run: |
          npm install cognium-ai@latest
          ln -s node_modules/circle-ir/dist/wasm wasm

      - name: Run security scan
        env:
          LLM_BASE_URL: https://models.github.ai/inference
          LLM_API_KEY: ${{ github.token }}
          LLM_ENRICHMENT_MODEL: openai/gpt-4o-mini
        run: |
          # Exit code 0 = clean, 1 = security findings (fail CI), 2 = quality-only findings (ok)
          npx cognium-ai scan ./src || [ $? -eq 2 ]

      - name: Run trust score
        env:
          LLM_BASE_URL: https://models.github.ai/inference
          LLM_API_KEY: ${{ github.token }}
          LLM_ENRICHMENT_MODEL: openai/gpt-4o-mini
        run: |
          npx cognium-ai trust ./src
          npx cognium-ai trust ./src --format badge -o trust-badge.svg

      - name: Run quality score
        env:
          LLM_BASE_URL: https://models.github.ai/inference
          LLM_API_KEY: ${{ github.token }}
          LLM_ENRICHMENT_MODEL: openai/gpt-4o-mini
        run: |
          npx cognium-ai quality ./src
          npx cognium-ai quality ./src --format badge -o quality-badge.svg

      - name: Upload badges as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: badges
          path: |
            trust-badge.svg
            quality-badge.svg

      - name: Commit badges to badges branch
        if: github.ref == 'refs/heads/main'
        run: |
          # Save badges to temp before switching branches
          cp trust-badge.svg /tmp/trust-badge.svg 2>/dev/null || true
          cp quality-badge.svg /tmp/quality-badge.svg 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git fetch origin badges && git checkout badges || git checkout --orphan badges
          git rm -rf . 2>/dev/null || true
          cp /tmp/trust-badge.svg . 2>/dev/null || true
          cp /tmp/quality-badge.svg . 2>/dev/null || true
          git add trust-badge.svg quality-badge.svg
          git commit -m "Update badges [skip ci]" || echo "No changes to commit"
          git push origin badges --force
